
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="background:#1e1b18;">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;family=Noto+Serif+SC:wght@700&amp;display=swap');
    .title { font-family: 'Noto Serif SC', serif; font-size: 68px; font-weight: bold; fill: #ffffff; letter-spacing: 0.05em; }
    .category { font-family: 'Space Grotesk', monospace; font-size: 28px; fill: hsl(329, 70%, 60%); text-transform: uppercase; font-weight: bold; letter-spacing: 0.1em; }
    .brand { font-family: 'Space Grotesk', sans-serif; font-size: 22px; fill: #a5a5a5; opacity: 0.6; }
  </style>

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b18" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="hsl(329, 70%, 60%)" stop-opacity="0.2" />
      <stop offset="100%" stop-color="hsl(14, 60%, 50%)" stop-opacity="0.0" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#grad)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  
  <path d="M-200 630 Q 300 100 1400 300" fill="none" stroke="url(#accent)" stroke-width="60" style="filter: blur(8px);" />
  <path d="M0 630 Q 600 300 1400 630" fill="none" stroke="hsl(14, 60%, 50%)" stroke-width="20" stroke-opacity="0.3" />

  <circle cx="850" cy="200" r="150" fill="hsl(329, 70%, 60%)" opacity="0.1" filter="blur(40px)" />
  <circle cx="950" cy="250" r="4" fill="hsl(329, 70%, 60%)" />
  <circle cx="1000" cy="180" r="2" fill="#fff" opacity="0.5" />
  <path d="M 950 250 L 1000 180" stroke="hsl(329, 70%, 60%)" stroke-width="1" stroke-dasharray="4" opacity="0.4" />

  <g transform="translate(100, 0)">
    <text x="0" y="240" class="category">// 知识管理</text>
    <text x="0" y="320" class="title">卡片笔记写作法实践：从笔记到文章的无缝转化</text>
    
  </g>
  
  <text x="100" y="550" class="brand">QI-LAB | SYSTEMIZED ENGINEERING AESTHETICS</text>
  <text x="1000" y="550" class="brand" style="opacity: 0.3;">ZH</text>
</svg>