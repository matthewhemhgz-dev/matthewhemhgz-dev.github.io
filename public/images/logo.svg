<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDD98A"/>
      <stop offset="100%" stop-color="#C49A3A"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形背景 -->
